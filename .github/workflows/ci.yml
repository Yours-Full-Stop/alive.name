name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Ubuntu, full suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Needed only for the `reclaim` integration tests; the rest skip cleanly
      # without it.
      - name: Install git-filter-repo
        run: sudo apt-get update && sudo apt-get install -y git-filter-repo

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet (both build tags)
        run: |
          go vet ./...
          go vet -tags integration ./...

      - name: Unit tests (race)
        run: go test -race ./...

      - name: Integration tests (race)
        run: go test -tags integration -race ./...

  unit-cross:
    name: Unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The unit suite touches no git and no filesystem, so it runs anywhere.
      - name: Unit tests
        run: go test ./...
