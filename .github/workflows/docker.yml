name: Docker

# The image is only PUBLISHED on release tags, so every published image maps to a
# version (no drift, no floating "edge" image). On pushes to main and on pull
# requests the image is only BUILT, not pushed, which still catches a broken
# Dockerfile early.
#
# After the first published release, make the package public so it can be pulled
# without a login: repo -> Packages -> alive.name -> Package settings ->
# Change visibility -> Public.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Build image (publish only on release tags)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # For building the arm64 image on an amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in when we are actually going to push (a release tag).
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lower-cased automatically, so ghcr.io/yours-full-stop/alive.name.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build (and push only on a release tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          # Build arm64 (via emulation, slower) only when we publish.
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
